llm:
  provider: deepseek
  api_key: 
  base_url: https://api.deepseek.com
  model: deepseek-chat
  temperature: 0.3
  max_tokens: 2048
  citation_check:
    enabled: true
    retries: 1
    model: deepseek-chat
embedding:
  model: BAAI/bge-small-en-v1.5
  device: cpu
  batch_size: 32
retrieval:
  top_k: 5
  score_threshold: 0.5
  chunk_size: 512
  chunk_overlap: 64
  query_decomposition:
    enabled: false
    max_subquestions: 3
vector_store:
  index_path: ./data/faiss_index
  dimension: 384
reranker:
  enabled: false
  model: BAAI/bge-reranker-base
  device: cpu
  batch_size: 16
  candidate_top_k: 20
server:
  host: 0.0.0.0
  port: 8000
  reload: true
